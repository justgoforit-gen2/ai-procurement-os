auth:
  enabled: false            # true: require X-API-Key header
  api_key_header: "X-API-Key"

cors:
  allow_origins:
    - "http://localhost:8501"   # Streamlit dev
  allow_methods: ["GET", "POST"]

upload:
  max_file_size_mb: 20
  allowed_mime_types:
    - application/pdf
    - image/png
    - image/jpeg
    - image/tiff
