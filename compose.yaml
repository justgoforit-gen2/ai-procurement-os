name: procurement-os

services:

  # ------------------------------------------------------------------
  # FastAPI — Procurement OS API
  # ------------------------------------------------------------------
  api:
    build: .
    command: uvicorn services.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      # Mount config read-only so module toggles take effect on restart
      # without rebuilding the image.
      - ./config:/app/config:ro
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Streamlit — OCR Document Reader UI
  # ------------------------------------------------------------------
  ui:
    build: .
    command: >
      streamlit run apps/OCR-doc-reader/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8501:8501"
    volumes:
      - ./config:/app/config:ro
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
