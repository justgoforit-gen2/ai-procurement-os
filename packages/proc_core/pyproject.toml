[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "proc-core"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "pyyaml>=6.0",
    "pandas>=2.0",
    "numpy>=1.26",
    "plotly>=5.0",
]

# pyproject.toml is inside packages/proc_core/ (= the package itself).
# package-dir maps the proc_core namespace to "." so pip can find it
# without traversing the parent directory (safe in PEP 517 build isolation).
[tool.setuptools.package-dir]
proc_core = "."

[tool.setuptools.packages.find]
where = [".."]
include = ["proc_core*"]
