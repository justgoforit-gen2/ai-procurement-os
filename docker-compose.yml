services:
  api:
    build:
      context: .
    command: uvicorn services.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/packages
    volumes:
      - ./config:/app/config

  ui:
    build:
      context: .
    command: streamlit run apps/OCR-doc-reader/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app/packages
    volumes:
      - ./config:/app/config
