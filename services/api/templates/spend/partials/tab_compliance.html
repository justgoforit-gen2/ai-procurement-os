<div class="kpi-card inline-block mb-4">
  <div class="kpi-label">全体マーベリック率</div>
  <div class="kpi-value">{{ overall_rate }}</div>
</div>

<h2 class="text-base font-semibold text-gray-700 mb-3">部門別マーベリック率</h2>
{{ chart | safe }}

<hr class="my-5 border-gray-100">
<h2 class="text-base font-semibold text-gray-700 mb-2">全発見事項</h2>
{% if table %}
<div class="overflow-auto max-h-96">
  <table class="data-table">
    <thead>
      <tr>{% for col in table_cols %}<th>{{ col }}</th>{% endfor %}</tr>
    </thead>
    <tbody>
      {% for row in table %}
      <tr class="{% if row.get('severity') == 'HIGH' %}row-high{% elif row.get('severity') == 'MEDIUM' %}row-medium{% endif %}">
        {% for col in table_cols %}<td>{{ row[col] }}</td>{% endfor %}
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<p class="text-sm text-gray-400">発見事項なし</p>
{% endif %}
