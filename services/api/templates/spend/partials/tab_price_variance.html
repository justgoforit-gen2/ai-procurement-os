<h2 class="text-base font-semibold text-gray-700 mb-3">CV上位カテゴリ (上位15)</h2>
{{ chart | safe }}

<hr class="my-5 border-gray-100">
<h2 class="text-base font-semibold text-gray-700 mb-2">詳細テーブル (CV &gt; 0.3)</h2>
{% if table %}
<div class="overflow-auto max-h-96">
  <table class="data-table">
    <thead>
      <tr>{% for col in table_cols %}<th>{{ col }}</th>{% endfor %}</tr>
    </thead>
    <tbody>
      {% for row in table %}
      <tr>{% for col in table_cols %}<td>{{ row[col] }}</td>{% endfor %}</tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<p class="text-sm text-gray-400">CV &gt; 0.3 の品目なし</p>
{% endif %}
